version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: llmpot-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-llmpot_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-llmpot_secret}
      POSTGRES_DB: ${POSTGRES_DB:-llmpot_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-llmpot_admin} -d ${POSTGRES_DB:-llmpot_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal_net

  redis:
    image: redis:7-alpine
    container_name: llmpot-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal_net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: llmpot-backend
    read_only: true
    tmpfs:
      - /tmp
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-llmpot_admin}:${POSTGRES_PASSWORD:-llmpot_secret}@postgres:5432/${POSTGRES_DB:-llmpot_db}
      - REDIS_URL=redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal_net
      - api_net

  edge-node:
    build:
      context: ../edge-node
      dockerfile: Dockerfile
    container_name: llmpot-edge-node
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_REGION=${NODE_REGION:-global-1}
      - NODE_IP=${NODE_IP:-127.0.0.1}
    ports:
      - "80:8000"
      - "443:8443"
      - "8081:8080"
      - "9200:9200"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal_net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: llmpot-frontend
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - api_net

volumes:
  postgres_data:
  redis_data:

networks:
  internal_net:
    driver: bridge
  api_net:
    driver: bridge
